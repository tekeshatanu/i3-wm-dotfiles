; ── Monochrome Polybar ────────────────────────────────────────

[colors]
bg      = #1a1a1a
surface = #222222
border  = #2a2a2a
fg      = #cccccc
cyan    = #89DCEB
gray    = #555555
red     = #e06c75
green   = #98c379
yellow  = #e5c07b
black   = #0d0d0d

[bar/main]
monitor = VGA1
width = 1880
height = 32
offset-x = 20
offset-y = 8
radius = 10
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
border-size = 1
border-color = ${colors.border}
padding-left = 2
padding-right = 2
module-margin = 1
font-0 = JetBrainsMono Nerd Font:size=9;2
font-1 = Noto Sans Symbols2:size=10;2
font-2 = JetBrainsMono Nerd Font:size=13;3
modules-left = archmenu xworkspaces sep music-prev music-play music-next music-info
modules-center = cpu ram disk volume
modules-right = notifications sep screenshot sep network battery sep date sep powermenu
wm-restack = i3
override-redirect = true
enable-ipc = true

[module/archmenu]
type = custom/text
format = "󰣇"
format-foreground = ${colors.cyan}
format-font = 3
format-padding = 1
click-left = rofi -show drun -theme ~/.config/rofi/launcher.rasi

[module/sep]
type = custom/text
format = "|"
format-foreground = ${colors.border}

[module/xworkspaces]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = false
index-sort = true
enable-click = true
enable-scroll = false
format = <label-state>
label-focused = ●
label-focused-foreground = ${colors.cyan}
label-focused-padding = 1
label-occupied = ●
label-occupied-foreground = ${colors.gray}
label-occupied-padding = 1
label-unfocused = ○
label-unfocused-foreground = ${colors.gray}
label-unfocused-padding = 1
label-urgent = ●
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1
label-visible = ○
label-visible-foreground = ${colors.gray}
label-visible-padding = 1

[module/music-prev]
type = custom/text
format = "⏮"
format-font = 2
format-foreground = ${colors.gray}
click-left = mpc prev

[module/music-play]
type = custom/script
exec = ~/.config/polybar/playpause.sh
interval = 1
format-font = 2
format-foreground = ${colors.cyan}
click-left = mpc toggle

[module/music-next]
type = custom/text
format = "⏭"
format-font = 2
format-foreground = ${colors.gray}
click-left = mpc next

[module/music-info]
type = custom/script
exec = mpc --format "%title%" current 2>/dev/null | head -c 25 || echo "No music"
interval = 2
format-prefix = " "
format-prefix-font = 2
format-prefix-foreground = ${colors.cyan}
format-foreground = ${colors.fg}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.cyan}
label = %percentage%%
label-foreground = ${colors.fg}
format-underline =
warn-percentage = 80
label-warn = %percentage%%
label-warn-foreground = ${colors.red}

[module/ram]
type = internal/memory
interval = 2
format-prefix = "󰾅 "
format-prefix-foreground = ${colors.cyan}
label = %percentage_used%%
label-foreground = ${colors.fg}
warn-percentage = 85
label-warn = %percentage_used%%
label-warn-foreground = ${colors.red}

[module/disk]
type = internal/fs
mount-0 = /
interval = 30
format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${colors.cyan}
label-mounted = %percentage_used%%
label-mounted-foreground = ${colors.fg}
warn-percentage = 90
label-warn = %percentage_used%%
label-warn-foreground = ${colors.red}

[module/volume]
type = internal/pulseaudio
use-ui-max = false
interval = 2
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.cyan}
label-volume = %percentage%%
label-volume-foreground = ${colors.fg}
label-muted = "󰖁 muted"
label-muted-foreground = ${colors.gray}
click-right = pavucontrol
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +2%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -2%

[module/network]
type = custom/script
exec = ~/.config/polybar/network.sh
interval = 3
format-foreground = ${colors.cyan}
click-left = ~/.config/polybar/network-menu.sh

[module/battery]
type = custom/script
exec = ~/.config/polybar/battery.sh
interval = 30
format-foreground = ${colors.cyan}

[module/date]
type = internal/date
interval = 30
date = %d %b
time = %I:%M %p
label = " %time%   %date%"
label-foreground = ${colors.fg}
format-prefix = ""
format-prefix-foreground = ${colors.cyan}

[module/powermenu]
type = custom/text
format = "⏻"
format-font = 2
format-foreground = ${colors.red}
format-padding = 1
click-left = ~/.config/rofi/powermenu.sh

[module/notifications]
type = custom/script
exec = ~/.config/polybar/notifications.sh
interval = 3
format-foreground = ${colors.cyan}
click-left = ~/.config/polybar/notif-menu.sh
click-right = dunstctl close-all
scroll-up = dunstctl close-all

[module/screenshot]
type = custom/text
format = "󰹑"
format-foreground = ${colors.cyan}
format-padding = 1
click-left = ~/.config/polybar/screenshot.sh

