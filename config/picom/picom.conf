# ── Picom — rounding only, no transparency ────────────────────

backend = "xrender";
vsync = false;

# Corner rounding
corner-radius = 10;
rounded-corners-exclude = [
  "class_g = 'Polybar'"
];

# No shadows, no blur, no transparency
shadow = false;
fading = false;
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
